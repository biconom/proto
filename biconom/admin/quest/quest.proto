syntax = "proto3";

package biconom.admin.quest;

import "google/protobuf/empty.proto";
import "biconom/types/quest.proto";
import "biconom/types/exchange_currency_pair.proto";

// TradeQuestAdminService — административное управление торговыми квестами.
// Квесты привязаны к паре (exchange, currency_pair) и отслеживают торговые объёмы.
service TradeQuestAdminService {
    // Получить полную модель торгового квеста.
    rpc GetQuest(biconom.types.ExchangeCurrencyPair.Id) returns (biconom.types.Quest);

    // Создать новый этап торгового квеста. Sequence назначается автоматически.
    rpc CreateStage(CreateStageRequest) returns (CreateStageResponse);

    // Обновить существующий этап (только Pending или Active).
    rpc UpdateStage(UpdateStageRequest) returns (google.protobuf.Empty);

    // Удалить этап (только Pending).
    rpc DeleteStage(TradeQuestStageIdentifier) returns (google.protobuf.Empty);

    // Активировать этап (Pending → Active).
    rpc ActivateStage(TradeQuestStageIdentifier) returns (google.protobuf.Empty);

    // Приостановить этап (Active → Paused).
    rpc PauseStage(TradeQuestStageIdentifier) returns (google.protobuf.Empty);

    // Возобновить этап (Paused → Active).
    rpc ResumeStage(TradeQuestStageIdentifier) returns (google.protobuf.Empty);
}

// Идентификатор этапа торгового квеста.
message TradeQuestStageIdentifier {
    uint32 exchange_id = 1;       // ID обменника.
    uint32 currency_pair_id = 2;  // ID валютной пары.
    uint32 stage_id = 3;          // ID этапа.
}

// Запрос на создание этапа.
message CreateStageRequest {
    uint32 exchange_id = 1;       // ID обменника.
    uint32 currency_pair_id = 2;  // ID валютной пары.
    bool auto_activate = 3;       // Автоактивация после завершения предыдущего.

    // Условие триггера закрытия.
    biconom.types.Quest.ExchangeTradeQuest.TriggerCondition trigger = 4;

    // Награда при закрытии.
    biconom.types.Quest.ExchangeTradeQuest.Reward reward = 5;
}

// Ответ на создание этапа.
message CreateStageResponse {
    uint32 stage_id = 1; // ID созданного этапа.
}

// Запрос на обновление этапа.
message UpdateStageRequest {
    uint32 exchange_id = 1;       // ID обменника.
    uint32 currency_pair_id = 2;  // ID валютной пары.
    uint32 stage_id = 3;          // ID этапа.

    optional bool auto_activate = 4; // Новый флаг автоактивации.

    // Новое условие триггера (опционально).
    optional biconom.types.Quest.ExchangeTradeQuest.TriggerCondition trigger = 5;

    // Новая награда (опционально).
    optional biconom.types.Quest.ExchangeTradeQuest.Reward reward = 6;
}
