syntax = "proto3";

package biconom.admin.marketing;

import "google/protobuf/empty.proto";

import "biconom/types/license.proto";
import "biconom/types/marketing_slot.proto";
import "biconom/types/marketing_slot_placement.proto";

// MarketingService — админский сервис для управления маркетинговыми сущностями.
service MarketingService {
    // Выдаёт лицензионный ваучер для слота или дистрибьютора.
    // Режим выдачи определяется полем `mode` в запросе.
    rpc GrantSubscription(GrantSubscriptionRequest) returns (biconom.types.MarketingSlot.State);

    // Начисляет квоту бесплатных ручных расстановок на слот.
    // Квота суммируется с существующим балансом.
    rpc GrantPlacementQuota(PlacementQuotaRequest) returns (biconom.types.MarketingSlotPlacement.Balance);

    // Штрафует квоту слота (уменьшает баланс).
    // Гарантия: баланс никогда не уйдёт ниже нуля.
    // Если amount > quota_available — возвращает FAILED_PRECONDITION.
    rpc PenalizePlacementQuota(PlacementQuotaRequest) returns (biconom.types.MarketingSlotPlacement.Balance);

    // Прочитать глобальную битовую маску маркетинга.
    // Каждое поле ответа отражает отдельный бит маски `MarketingFlags`.
    rpc GetMarketingFlags(google.protobuf.Empty) returns (GetMarketingFlagsResponse);

    // Изменить глобальную битовую маску маркетинга.
    // Каждое поле запроса — отдельный бит. null/absent → бит не меняется.
    // true → устанавливается. false → сбрасывается.
    rpc SetMarketingFlags(SetMarketingFlagsRequest) returns (google.protobuf.Empty);

    // Прочитать битовую маску флагов конкретного дистрибьютора.
    // Каждое поле ответа отражает отдельный бит маски `Distributor::flags`.
    rpc GetDistributorFlags(GetDistributorFlagsRequest) returns (GetDistributorFlagsResponse);

    // Изменить битовую маску флагов конкретного дистрибьютора.
    // Каждое поле запроса — отдельный бит. null/absent → бит не меняется.
    // true → устанавливается. false → сбрасывается.
    rpc SetDistributorFlags(SetDistributorFlagsRequest) returns (google.protobuf.Empty);
}

// Запрос на выдачу лицензии администратором.
message GrantSubscriptionRequest {
    // Режим административной выдачи лицензии.
    enum Mode {
        // Бесплатный грант: ваучер создаётся без оплаты.
        // Маркетинговые выплаты партнёрам НЕ начисляются.
        // Пул ORG_POOL_LICENSE_MARKETING не затрагивается.
        FREE = 0;

        // Финансирование от компании: деньги переводятся из ORG_POOL_GIFT
        // в ORG_POOL_LICENSE_FEE + ORG_POOL_LICENSE_MARKETING, затем
        // активация происходит с полными маркетинговыми выплатами партнёрам —
        // как будто пользователь сам купил лицензию.
        COMPANY_FUNDED = 1;
    }

    // Идентификатор тарифного плана (содержит tree_id).
    biconom.types.License.Plan.Id plan_id = 1;

    // Цель назначения подписки.
    oneof target {
        // ID конкретного слота, которому присваивается лицензия.
        uint32 slot_id = 2;
        // ID дистрибьютора. Система выберет его первичный слот в указанном дереве.
        uint32 distributor_id = 3;
    }

    // Режим выдачи лицензии.
    Mode mode = 4;
}

// Запрос на изменение квоты расстановок слота администратором.
message PlacementQuotaRequest {
    // ID целевого слота.
    uint32 slot_id = 1;
    // Количество единиц квоты (> 0).
    uint32 amount = 2;
}

// Ответ на запрос чтения глобальной битовой маски маркетинга.
// Каждое поле — отдельный бит маски `MarketingFlags`.
message GetMarketingFlagsResponse {
    // V2: выплата реферального бонуса только на 1-м уровне (только инвайт-бонус 10%).
    bool v2 = 1;
}

// Запрос на изменение глобальной битовой маски маркетинга.
// Каждое поле — отдельный бит маски `MarketingFlags`.
// null/absent → бит не меняется. true → устанавливается. false → сбрасывается.
message SetMarketingFlagsRequest {
    // V2: выплата реферального бонуса только на 1-м уровне (только инвайт-бонус 10%).
    optional bool v2 = 1;
}

// Запрос на чтение битовой маски флагов дистрибьютора.
message GetDistributorFlagsRequest {
    // ID дистрибьютора (> 0).
    uint32 distributor_id = 1;
}

// Ответ на запрос чтения битовой маски флагов дистрибьютора.
// Каждое поле — отдельный бит маски `Distributor::flags`.
message GetDistributorFlagsResponse {
    // Полное наследование матчинг-бонуса.
    bool matching_bonus_full_inheritance = 1;
}

// Запрос на изменение битовой маски флагов дистрибьютора.
// Каждое поле — отдельный бит маски `Distributor::flags`.
// null/absent → бит не меняется. true → устанавливается. false → сбрасывается.
message SetDistributorFlagsRequest {
    // ID дистрибьютора (> 0).
    uint32 distributor_id = 1;
    // Полное наследование матчинг-бонуса.
    optional bool matching_bonus_full_inheritance = 2;
}
