syntax = "proto3";

package biconom.types;

import "biconom/types/asset.proto";
import "google/protobuf/timestamp.proto";

// Агрегированный визуальный блок истории (карточка в UI).
message Transaction {
    message Group {
        uint64 group_id = 1;
        google.protobuf.Timestamp created_at = 2;
        message Status {
            enum Id {
                UNSPECIFIED = 0;
                SUCCESS = 1;     
                IN_PROGRESS = 2; 
                ERROR = 3;       
                REVERSED = 4;
            }
        }
        Status.Id status = 3;
        repeated Entry entries = 4;

        // Конкретная проводка, готовая к отображению в UI.
        message Entry {
            uint32 currency_id = 1;
            string amount = 3; 
            oneof details {
                ReceiveDetails receive = 4;
                WithdrawalDetails withdrawal = 5;
                CommentedDetails gift = 6;
                CommentedDetails adjustment = 7;
                TransferInDetails transfer_in = 8;
                TransferOutDetails transfer_out = 9;
                ExchangeDetails exchange = 10;
                MarketingVoucherPurchaseDetails marketing_voucher_purchase = 11;
                SlotCapacityUpgradeDetails slot_capacity_upgrade = 12;
                SlotManualPlacementDetails slot_manual_placement = 13;
                ActivationBonusDetails activation_bonus = 14;
                TradeReferralBonusDetails trade_referral_bonus = 15;
                LicenseReferralBonusDetails license_referral_bonus = 16;
                DividendPoolClaimDetails dividend_pool_claim = 17;
                ArenaPrizeDetails arena_prize = 18;
                WithdrawalFeeDetails withdrawal_fee = 19;
                LicenseDirectBonusDetails license_direct_bonus = 20;
                SplitMatchingBonusDetails split_matching_bonus = 21;
                ReinvestDiscountDetails reinvest_discount = 22;
            }

            // Метаданные для карточки пополнения (Receive)
            message ReceiveDetails {
                // Идентификатор платежной сети, через которую прошло пополнение (например, ID сети BSC).
                uint32 payment_network_id = 1;
                // Хэш транзакции в сети (обязателен для блокчейн пополнений).
                string transaction_hash = 2;
                // Адрес, с которого было пополнение (опционально).
                optional string address = 3;
            }

            // Метаданные для карточки вывода средств (Withdrawal)
            message WithdrawalDetails {
                // Уникальный идентификатор заявки на вывод.
                uint32 withdrawal_id = 1;
                // Идентификатор платежной сети, через которую осуществляется вывод (например, ID сети BSC).
                uint32 payment_network_id = 2;
                // Адрес кошелька, на который выводятся средства.
                string address = 3;
                // Хэш транзакции вывода в сети (опционально, может отсутствовать, если вывод еще в обработке).
                optional string transaction_hash = 4;
            }

            // Метаданные для карточки комиссии за вывод средств (Withdrawal Fee)
            message WithdrawalFeeDetails {
                // Уникальный идентификатор заявки на вывод, к которой относится эта комиссия.
                uint32 withdrawal_id = 1;
            }

            // Общая модель для деталей, содержащих только опциональный комментарий 
            // (например, для подарка или ручной корректировки/штрафа).
            message CommentedDetails {
                // Текстовый комментарий, поясняющий операцию.
                optional string comment = 1;
            }

            // Метаданные для карточки входящего внутреннего перевода (Transfer Incoming)
            message TransferInDetails {
                // Идентификатор дистрибьютора, который отправил средства.
                uint32 sender_distributor_id = 1;
            }

            // Метаданные для карточки исходящего внутреннего перевода (Transfer Outgoing)
            message TransferOutDetails {
                // Идентификатор дистрибьютора, которому отправлены средства.
                uint32 payee_distributor_id = 1;
            }

            // Метаданные для карточки обмена валют (Trade / Purchase / Exchange)
            message ExchangeDetails {
                // Идентификатор торговой/валютной пары.
                uint32 trading_pair_id = 1;
                // Идентификатор пула ликвидности (обменника).
                uint32 exchange_id = 2;
            }

            // Метаданные для карточки покупки маркетингового ваучера (лицензии)
            message MarketingVoucherPurchaseDetails {
                // Идентификатор дерева, который определяет саму лицензию (например, Win Lite, Win Pro).
                uint32 tree_id = 1;
                // Идентификатор слота, на который куплен ваучер.
                uint32 slot_id = 2;
                // Идентификатор купленного ваучера.
                uint32 voucher_id = 3;
            }

            // Метаданные для карточки покупки расширения слота (увеличения ширины / новой ветки)
            message SlotCapacityUpgradeDetails {
                // Идентификатор дерева
                uint32 tree_id = 1;
                // Идентификатор слота, который был расширен.
                uint32 slot_id = 2;
                // Предыдущая вместимость (ширина) слота.
                uint32 old_children_capacity = 3;
                // Новая вместимость (ширина) слота (например, была 5, стала 6).
                uint32 new_children_capacity = 4;
            }

            // Метаданные для карточки покупки ручной расстановки (установка слота личника в конкретную позицию)
            message SlotManualPlacementDetails {
                // Идентификатор дерева, в котором производилась расстановка.
                uint32 tree_id = 1;
                // Идентификатор слота (личника), который был расставлен.
                uint32 target_slot_id = 2;
                // Идентификатор родительского слота, под который произведена расстановка.
                uint32 target_parent_id = 3;
                // Номер ответвления (ветки) родительского слота.
                uint32 target_parent_branch_number = 4;
            }

            // Метаданные для карточки бонуса за покупку лицензии (Cashback / Activation Bonus)
            message ActivationBonusDetails {
                // Идентификатор дерева (лицензии), за которую начислен бонус.
                uint32 tree_id = 1;
                // Идентификатор слота, который был активирован.
                uint32 target_slot_id = 2;
                // Идентификатор купленного ваучера, за который произошел возврат средств.
                uint32 voucher_id = 3;
            }

            // Метаданные для карточки получения реферального бонуса от торговой сделки нижестоящего партнера (Payout)
            message TradeReferralBonusDetails {
                // Идентификатор торговой/валютной пары, по которой была совершена сделка.
                uint32 trading_pair_id = 1;
                // Уровень глубины (линия) нижестоящего партнера в структуре.
                uint32 depth_level = 2;
                // Идентификатор дистрибьютора (инициатора), который совершил сделку.
                uint32 initiator_distributor_id = 3;
            }

            // Метаданные для карточки получения реферального/структурного бонуса от покупки лицензии нижестоящим партнером (Payout)
            message LicenseReferralBonusDetails {
                // Идентификатор дерева (лицензии), за покупку которой начислен бонус.
                uint32 tree_id = 1;
                // Уровень глубины (линия/уровень) нижестоящего партнера в структуре.
                uint32 depth_level = 2;
                // Идентификатор дистрибьютора (инициатора), который купил лицензию.
                uint32 initiator_distributor_id = 3;
                // Идентификатор слота, на который была куплена лицензия.
                uint32 slot_id = 4;
                // Идентификатор купленного ваучера.
                uint32 voucher_id = 5;
            }

            // Метаданные для карточки получения прямого линейного бонуса за продажу лицензии партнером (Payout)
            message LicenseDirectBonusDetails {
                // Идентификатор дерева (лицензии), за покупку которой начислен бонус.
                uint32 tree_id = 1;
                // Уровень глубины (линия) партнера в линейной структуре.
                uint32 depth_level = 2;
                // Идентификатор дистрибьютора (инициатора), который купил лицензию.
                uint32 initiator_distributor_id = 3;
                // Идентификатор слота, на который была куплена лицензия.
                uint32 slot_id = 4;
                // Идентификатор купленного ваучера.
                uint32 voucher_id = 5;
            }

            // Метаданные для карточки клейма дивидендов (Claim Dividend Pool)
            message DividendPoolClaimDetails {
                // В текущем UI дополнительные данные не требуются, так как подзаголовок жестко задан ("Dividend Pool").
            }

            // Метаданные для карточки получения приза за участие в Арене
            message ArenaPrizeDetails {
                // Идентификатор арены (например, для определения названия "Wincoin").
                uint32 arena_id = 1;
                // Номер цикла арены (например, для вывода "Arena #23").
                uint32 cycle_seq = 2;
                // Занятое призовое место (пока не используется в списке транзакций, но полезно для экрана деталей).
                uint32 place = 3;
            }

            // Метаданные карточки получения «скользящего» матчинг-бонуса (сплит бонуса).
            //
            // Контекст: матчинг-бонус — это автоматическое распределение части
            // дохода нижестоящего партнёра-инициатора (например, 50% от его клейма
            // дивидендов) вверх по реферальной цепочке. Каждый спонсор получает
            // долю по «скользящей» формуле:
            //   target = min((sponsor_deposit × full_bonus) / initiator_deposit, full_bonus)
            //   payout = max(target − уже_выплачено_ниже, 0)
            // Эта карточка отображает ОДНУ такую выплату конкретному получателю.
            //
            // Все денежные суммы — отформатированные строки в валюте проводки
            // (значение `currency_id` транзакции, не обязательно USDT — система
            // готова к будущим валютам).
            message SplitMatchingBonusDetails {
                // Идентификатор дистрибьютора-инициатора, чьё действие
                // (например, claim дивидендов) спровоцировало распределение.
                // Используется UI для отображения «бонус от <Имя>».
                uint32 initiator_distributor_id = 1;

                // Глубина данного получателя в цепочке от инициатора.
                // 1 = прямой реферер инициатора, 2 = реферер реферера, и т.д.
                uint32 depth_level = 2;

                // Полный объём матчинг-бонуса в группе, который распределялся
                // вверх по структуре (РБ в терминах ТЗ). Сумма, что текущий
                // пользователь получил, лежит в `amount` самой проводки;
                // здесь — «общий пирог», от которого считались доли.
                string original_matching_amount = 3;

                // Снимок депозита (суммарных инвестиций пользователя в WIN-токен)
                // в момент выплаты. Используется в формуле расчёта доли как
                // числитель: чем больше депозит — тем больше доля. Сохраняется
                // на момент проводки, последующие изменения депозита его не меняют.
                string sponsor_deposit_at_pay = 4;

                // Теоретический максимум, который данный пользователь мог
                // получить с этой группы матчинг-бонуса по своему депозиту
                // (значение `target` из формулы выше, ДО вычета «уже выплачено ниже»).
                // Полезно для UI «вы получили X из возможных Y».
                string target_limit = 5;

                // Сумма, которая прошла мимо данного пользователя и ушла дальше
                // вверх по цепочке (либо вернулась в org-пул, если цепочка кончилась).
                // Это «упущенная выгода» — сколько ещё можно было бы получить,
                // будь депозит больше или окажись выше в структуре.
                string missed_amount = 6;

                // Был ли активен у пользователя флаг полного наследования
                // матчинг-бонуса (`Flags::MATCHING_BONUS_FULL_INHERITANCE`).
                // Если `true` — пользователь забрал весь остаток группы независимо
                // от пропорциональной формулы, и цепочка обрыватся на нём.
                bool had_flag = 7;
            }

            // Метаданные для карточки дисконт-бонуса авто-реинвеста.
            //
            // Это ОТДЕЛЬНАЯ транзакция (свой `group_id`), не входящая в группу
            // покупки WIN. Начисляется эмиссией WIN сверх купленного объёма на
            // каждом авто-цикле дивидендного пула. Сама сумма дисконта (в WIN)
            // лежит в `amount` проводки; здесь — пояснительные метаданные.
            message ReinvestDiscountDetails {
                // Процент дисконта, по которому начислен бонус (снимок тарифа на
                // момент выбора авто-реинвеста). Строка с 4 знаками, напр. "20.0000".
                string discount_percent = 1;

                // Объём купленного WIN на этом авто-цикле, от которого считался
                // дисконт (`amount = source_win × discount_percent / 100`).
                // Строка в десятичном виде с учётом точности WIN.
                string source_win = 2;
            }
        }
    }
}
