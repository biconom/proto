syntax = "proto3";

package biconom.types;

import "google/protobuf/timestamp.proto";
import "biconom/types/image.proto";
import "biconom/types/presence.proto";

// Модель данных для пользователя системы
message User {
	message Id {
		uint32 id = 1; // Глобальный ID пользователя
	}

	message List {
		repeated User items = 1; // Элементы списка (пользователи)
	}

	uint32 id = 1;
	biconom.types.Presence.Status presence_status = 2;
	uint32 policy_id = 3; // Политика, управляющая поведением пользователя.
	google.protobuf.Timestamp created_at = 4;
	google.protobuf.Timestamp updated_at = 5;

	// Аватарка пользователя. Отсутствует, если пользователь не загружал изображение.
	optional biconom.types.Image avatar = 6;

	// Email пользователя. Заполняется ТОЛЬКО в контекстах, где у запрашивающего есть право видеть
	// контакты (например, просмотр профиля своей команды/иерархии в DistributorService.Get).
	// В прочих ответах, отдающих User, отсутствует.
	optional string email = 7;

	// Telegram username пользователя (без внутреннего telegram_user_id).
	// Условия заполнения — те же, что и для email.
	optional string telegram_username = 8;
}
