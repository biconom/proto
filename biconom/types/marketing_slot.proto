syntax = "proto3";

package biconom.types;

import "biconom/types/slot.proto";
import "biconom/types/distributor.proto";
import "biconom/types/account.proto";
import "biconom/types/subscription.proto";
import "biconom/types/price.proto";
import "biconom/types/license.proto";
import "google/protobuf/timestamp.proto";

// MarketingSlot представляет собой агрегированную модель данных маркетингового слота.
message MarketingSlot {
    message List {
        repeated MarketingSlot items = 1;
    }
    message DistributorState {
        message TreeState {
            uint32 tree_id = 1;
            uint32 slots_for_placement_count = 2; // Количество слотов, ожидающих ручной расстановки
            uint32 slots_for_compression_count = 3; // Количество слотов, которые могут подняться за счёт компрессии
            optional uint32 primary_slot_id = 4; // Основной слот в дереве у дистрибьютора
        }
        uint32 distributor_id = 1;
        repeated TreeState tree_states = 2;
        bool viewable = 3; // Имеет ли текущий авторизованный пользователь право на просмотр профиля данного дистрибьютора
    }

    // State содержит динамическую информацию о состоянии слота и лицензии.
    message State {
        message List {
            repeated State items = 1;
        }
        uint32 slot_id = 1;
        uint32 distributor_id = 2; // Идентификатор дистрибьютора, владеющего слотом
        biconom.types.License.State license_state = 3;      // Техническое право доступа
        biconom.types.Subscription.State subscription_state = 4; // Состояние оплаты/биллинга
        uint32 tree_id = 5; // Идентификатор дерева, к которому относится слот
        bool placement_required = 6; // Нуждается ли слот в расстановке
        google.protobuf.Timestamp placement_deadline_at = 7; // Дедлайн ручной расстановки; после этого момента сработает автоматическая
        optional google.protobuf.Timestamp placement_executed_at = 8; // Когда по факту произошла расстановка слота в иерархии
        bool viewable = 9; // Имеет ли текущий пользователь право на просмотр данного слота
        // Доступный остаток квоты бесплатных ручных расстановок.
        // При выборе позиции совпадающей с авто-алгоритмом — квота не тратится.
        // При выборе иной позиции — списывается 1 единица. При 0 — расстановка платная.
        uint32 placement_quota_available = 10;
    }

    // Chain представляет собой цепочку (ответвление) в структуре маркетинга.
    message Chain {
        message SubChain {
            uint32 parent_branch_number = 1;
            repeated uint32 slot_ids = 2;
        }
        uint32 parent_branch_number = 1;
        repeated uint32 slot_ids = 2; // Массив ID слотов, входящих в цепочку
        repeated SubChain first_sub_chains = 4;

        message Income {
            uint32 bonus_id = 1;
            biconom.types.Price value = 2; // Сумма дохода
        }
        repeated Income incomes = 3;
    }

    // Breadcrumb описывает элемент пути навигации (хлебную крошку).
    message Breadcrumb {
        uint32 parent_branch_number = 1;
        uint32 slot_id = 2; // Выбранный слот в цепочке
        repeated uint32 slot_ids = 3; // Список всех ID слотов, относящихся к цепочке
    }

    uint32 executor_slot_id = 1;
    uint32 view_slot_id = 2; // Идентификатор просматриваемого слота в иерархии
    uint32 tree_id = 9; // Идентификатор дерева, в котором находятся слоты (executor_slot_id и view_slot_id принадлежат этому дереву)
    repeated Breadcrumb breadcrumbs = 3; // Путь (хлебные крошки) между executor и view
    repeated Chain view_chains = 4; // Структура дочерних цепочек для view_slot_id
    repeated State slot_states = 5; // Список состояний для интересующих слотов
    repeated biconom.types.Slot slots = 6; // Все связанные слоты
    repeated biconom.types.Distributor distributors = 7; // Дистрибьюторы, владеющие слотами
    repeated biconom.types.Account accounts = 8; // Аккаунты, владеющие дистрибьюторами
    repeated DistributorState distributor_states = 10; // Состояния дистрибьюторов

    // Количество слотов на каждом уровне иерархии (агрегация)
    message LevelSlotCount {
        uint32 level = 1; // Уровень в иерархии
        uint32 count = 2; // Количество слотов на данном уровне
    }
    repeated LevelSlotCount level_slot_counts = 11; // Агрегированное количество слотов по уровням
}

// MarketingSlotV2 — облегчённая модель просмотра слота.
//
// В отличие от MarketingSlot, не содержит breadcrumbs и view_chains; в slots/distributors/
// accounts/states присутствуют только авторизованный (executor) и просматриваемый (view) слоты.
// Агрегированные данные структуры отдаются через levels_state (уровни 1..MARKETING_LEVEL_LIMIT).
message MarketingSlotV2 {
    // Агрегированное состояние одного уровня глубины структуры (из level_agg слота).
    message LevelState {
        uint32 level = 1;                 // Уровень глубины (1..MARKETING_LEVEL_LIMIT)
        uint32 structure_quantity = 2;    // Количество слотов на уровне
        // Эталонная ёмкость уровня при идеально равномерном дереве: D в степени уровня,
        // где D = MARKETING_SLOT_DEFAULT_CHILDREN_CAPACITY.
        uint64 structure_capacity_default = 3;
        // Потенциальная ёмкость уровня: сколько мест было бы на уровне, если бы все свободные
        // ответвления вышестоящих заполнялись слотами стандартной ширины
        // MARKETING_SLOT_DEFAULT_CHILDREN_CAPACITY (D), с учётом уже расширивших себе ёмкость.
        // level 1 = structure_capacity_reserved; level k≥2 = (potential[k-1] − quantity[k-1])*D + reserved[k].
        uint64 structure_capacity_potential = 4;
        uint64 structure_capacity_reserved = 5; // Зарезервированная (фактическая) ёмкость мест на уровне от вышестоящих
        biconom.types.Price structure_income = 6; // Доход (USDT) структуры на уровне
    }

    uint32 executor_slot_id = 1;          // Авторизованный слот
    uint32 view_slot_id = 2;              // Просматриваемый слот
    uint32 tree_id = 3;                   // Дерево, к которому относятся слоты
    repeated MarketingSlot.State slot_states = 4;              // Состояния только executor и view
    repeated biconom.types.Slot slots = 5;                    // Только executor и view
    repeated biconom.types.Distributor distributors = 6;      // Дистрибьюторы этих слотов
    repeated biconom.types.Account accounts = 7;              // Аккаунты этих дистрибьюторов
    repeated MarketingSlot.DistributorState distributor_states = 8; // Состояния дистрибьюторов
    repeated LevelState levels_state = 9; // Агрегаты по уровням глубины структуры view-слота
}
