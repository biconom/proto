syntax = "proto3";

package biconom.types;

import "google/protobuf/timestamp.proto";

// Переиспользуемые модели подсистемы Geo (карта геометок дистрибьюторов).
//
// Geo — отдельный сервис-оркестратор: хранит геометки (distributor_id → координаты),
// а данные иерархии (команда/линия) и баланс WinTime подтягивает из соответствующих
// подсистем на стороне сервера. Координаты во внешнем API — double (градусы);
// внутри хранилища — fixed-point i32 (lat/lon * 1e6), деталь реализации не утекает.

// Geo — пространство имён для моделей карты геометок.
message Geo {
    // Область видимости точек на карте по иерархии смотрящего (единообразно с
    // analytics.ScopeOptions). Сам смотрящий в основной список pins попадает только при
    // include_personal = true; его личная метка всегда отдаётся отдельно (my_pin).
    message ScopeOptions {
        // Область видимости.
        enum Id {
            UNSPECIFIED = 0;  // Не задано → ошибка.
            PERSONAL = 1;     // Только сам смотрящий.
            TEAM = 2;         // Поддерево смотрящего (с ограничением глубины team_depth_limit).
            COMPANY_WIDE = 3; // Вся компания (весь проект), без учёта иерархии.
        }

        // Выбранная область видимости.
        Id id = 1;

        // Максимальная глубина поддерева от смотрящего (только для TEAM). depth = 0 → команда
        // не обходится (только сам, если include_personal); depth = 1 → первая линия; и т.д.
        // Не указано → вся доступная глубина.
        optional uint32 team_depth_limit = 2;

        // Включать ли самого смотрящего в основной список pins (в дополнение к my_pin).
        // Для COMPANY_WIDE не применяется (смотрящий и так может попасть в проект-выборку).
        bool include_personal = 3;
    }

    // Географические координаты (градусы). Переиспользуемый тип: широта −90..90,
    // долгота −180..180. Сервер валидирует и приводит к внутреннему fixed-point.
    message Coordinates {
        double latitude = 1;  // Широта (градусы, −90..90)
        double longitude = 2; // Долгота (градусы, −180..180)
    }

    // Геометка дистрибьютора на карте.
    message Pin {
        uint32 distributor_id = 1; // Владелец метки
        double latitude = 2;       // Широта (градусы, −90..90)
        double longitude = 3;      // Долгота (градусы, −180..180)
        int64 win_time_balance = 4; // Баланс WinTime владельца на момент ответа (знаковый)
        google.protobuf.Timestamp updated_at = 5; // Время последнего обновления метки
    }

    // Кластер геометок — плотная группа дистрибьюторов, схлопнутая в одну «точку» карты.
    //
    // Сервер группирует прошедшие фильтр (зона + баланс + иерархия) метки по адаптивной сетке
    // (размер ячейки подбирается под целевое число элементов ответа); ячейки с числом меток
    // выше порога отдаются кластером, разрежённые — отдельными `Pin` в `PinsResponse.pins`.
    // Кластер несёт агрегаты для отрисовки «пузыря» и топ-K меток для превью.
    message Cluster {
        // Центр кластера = геометрический центр ячейки сетки (не среднее координат меток).
        double latitude = 1;  // Широта центра ячейки (градусы)
        double longitude = 2; // Долгота центра ячейки (градусы)
        uint32 distributors_count = 3;     // Всего дистрибьюторов в кластере
        int64 win_time_balance = 4;  // Суммарный баланс WinTime кластера (знаковый)
        // Топ-K меток кластера по балансу (по убыванию) — для превью группы на фронте.
        repeated Pin top = 5;
        // Радиус охвата кластера НЕ передаётся: фронт рисует область сам (по балансу/количеству/своей логике).
    }
}
