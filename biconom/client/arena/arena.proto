syntax = "proto3";

package biconom.client.arena;

import "google/protobuf/empty.proto";
import "biconom/types/arena.proto";
import "biconom/types/sort.proto";
import "biconom/types/leaderboard.proto";

// ArenaService — клиентский сервис арен.
//
// Предоставляет доступ к списку арен, текущим и историческим циклам,
// а также к рейтинговым таблицам участников.
//
// Авторизация: требуется активная сессия (distributor_id).
service ArenaService {

    // ─── Арена ──────────────────────────────────────────────

    // Получить детальные данные по арене.
    // card.cycle = текущий активный цикл.
    // card.cycle.leaderboard.items = top-N + текущий дистрибьютор.
    rpc GetArena(biconom.types.Arena.Id) returns (biconom.types.Arena.Card);

    // Получить список всех арен.
    // card.cycle = последний цикл (leaderboard = null).
    rpc ListArenas(google.protobuf.Empty) returns (biconom.types.Arena.Card.List);

    // ─── Циклы ──────────────────────────────────────────────

    // Получить метаданные конкретного цикла (leaderboard = null).
    rpc GetCycle(biconom.types.Arena.Cycle.Id) returns (biconom.types.Arena.Cycle);

    // Получить список циклов арены (только метаданные, leaderboard = null).
    // Курсорная пагинация: seq последнего элемента как cursor в следующем запросе.
    rpc ListCycles(ListCyclesRequest) returns (biconom.types.Arena.Cycle.List);

    // ─── Лидерборд ──────────────────────────────────────────

    // Данные рейтинговой таблицы конкретного цикла.
    // leaderboard.items = top-N + текущий дистрибьютор.
    // Для текущего цикла: seq = arena.total_cycles.
    rpc GetLeaderboard(biconom.types.Arena.Cycle.Id) returns (biconom.types.Leaderboard);

    // Полный список участников лидерборда с курсорной пагинацией.
    // leaderboard.items = текущая страница + текущий дистрибьютор.
    rpc ListLeaderboardEntries(ListLeaderboardEntriesRequest) returns (biconom.types.Leaderboard);
}

// ─── Requests ───────────────────────────────────────────────

// Запрос списка циклов арены (cursor + sort pagination).
message ListCyclesRequest {
    // Идентификатор арены (id или name).
    biconom.types.Arena.Id arena_id = 1;
    // Курсор пагинации (seq цикла, exclusive). null = с самого нового.
    optional uint32 cursor = 2;
    // Параметры сортировки и лимита. По умолчанию: BACKWARD, 20 записей.
    optional biconom.types.Sort sort = 3;
}

// Запрос полного списка участников лидерборда.
message ListLeaderboardEntriesRequest {
    // Идентификатор цикла: arena_id + seq.
    biconom.types.Arena.Cycle.Id cycle_id = 1;
    // Курсор пагинации: rank последнего элемента из leaderboard.items (exclusive).
    // null = с начала списка.
    // Конец: получено записей меньше чем sort.limit.
    optional uint32 cursor = 2;
    // Лимит и направление. По умолчанию: FORWARD, 50 записей.
    optional biconom.types.Sort sort = 3;
}
