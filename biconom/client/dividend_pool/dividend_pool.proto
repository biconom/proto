syntax = "proto3";

package biconom.client.dividend_pool;

import "google/protobuf/empty.proto";
import "biconom/types/dividend_pool.proto";
import "biconom/types/sort.proto";

// DividendPoolService — клиентский сервис дивидендного пула.
//
// Механика пассивного дохода: пользователь получает ежедневные дивиденды
// пропорционально сумме USDT, потраченной на покупку WIN токенов.
//
// Жизненный цикл:
//   Активация → Генерация бонуса → Блокировка 24ч → Клейм → [Новая генерация]
//
// Пропущенные дни сгорают (мотивация ежедневных визитов).
service DividendPoolService {
    // Получить текущее состояние дивидендного пула для авторизованного пользователя.
    // Возвращает агрегированные метрики и pending-бонус (если активирован).
    // Не мутирует данные.
    rpc GetDividendPool(google.protobuf.Empty) returns (GetDividendPoolResponse);

    // Забрать (claim) начисленный бонус.
    //
    // Логика:
    // - Если бонус ещё не активирован — активирует и генерирует первый бонус (без зачисления).
    // - Если бонус разлокирован (unlock_at < now) — зачисляет USDT на spot-кошелёк.
    // - Если сервис Active — генерирует новый бонус с блокировкой 24ч.
    // - Если сервис Paused — зачисляет, но новый бонус не генерируется.
    // - Если сервис Stopped — ошибка DIVIDEND_POOL_SERVICE_STOPPED.
    //
    // Ошибки:
    // - FAILED_PRECONDITION: сервис остановлен, бонус заблокирован, нет дневного процента.
    rpc ClaimDividendPool(google.protobuf.Empty) returns (ClaimDividendPoolResponse);

    // Получить полную историю выплат дивидендов.
    // Возвращает все записи (без пагинации, ~365 записей/год).
    rpc GetDividendPoolHistory(google.protobuf.Empty) returns (GetDividendPoolHistoryResponse);

    // Получить историю матчинг-бонуса авторизованного пользователя как спонсора.
    // Курсорная пагинация по record_id; кумулятивные суммы (получено / упущено)
    // отдаются отдельно для виджета сводки.
    rpc GetMatchingBonusHistory(GetMatchingBonusHistoryRequest) returns (GetMatchingBonusHistoryResponse);

    // Выбрать авто-реинвест из актуальной конфигурации по числу циклов.
    // Дисконт берётся из конфигурации. Требует invested > 0 и статус Active.
    // При активном авто-реинвесте ручной ClaimDividendPool запрещён —
    // claim выполняется автоматически фоновым воркером.
    rpc SetAutoReinvest(SetAutoReinvestRequest) returns (SetAutoReinvestResponse);

    // Получить состояние авто-реинвеста: текущее состояние, доступные тарифы
    // из конфигурации и историю прошлых выборов.
    rpc GetAutoReinvest(google.protobuf.Empty) returns (GetAutoReinvestResponse);
}

// Ответ с текущим состоянием дивидендного пула.
message GetDividendPoolResponse {
    // Суммарный объём WIN, купленного через трейдинг (формат mantissa).
    string purchased_win = 1;

    // Суммарный объём WIN, заработанного через бонусы (формат mantissa).
    // Зарезервировано — в текущей версии бонусы начисляются в USDT.
    string earned_win = 2;

    // Суммарный объём USDT, потраченного на покупку WIN (формат mantissa).
    // Это «тело» для расчёта дивидендов.
    string invested_usdt = 3;

    // Суммарный объём USDT, полученного из дивидендного пула (формат mantissa).
    string received_usdt = 4;

    // Текущий pending-бонус. Отсутствует если дивиденды не активированы.
    optional biconom.types.DividendPool.PendingBonus bonus = 5;

    // Глобальный статус сервиса дивидендного пула.
    biconom.types.DividendPool.ServiceStatus.Id status = 6;

    // Текущий дневной процент (например "0.2667"). Пустая строка если ещё не генерировался.
    string current_daily_rate = 7;

    // Активен ли авто-реинвест прямо сейчас (включён + есть остаток циклов).
    // Если true — ручной ClaimDividendPool запрещён (DIVIDEND_POOL_AUTO_REINVEST_ACTIVE).
    bool auto_reinvest_active = 8;

    // Текущее состояние авто-реинвеста (если когда-либо выбирался).
    optional biconom.types.DividendPool.AutoReinvestState auto_reinvest = 9;

    // Суммарный WIN, полученный как дисконт-бонус за установку авто-реинвеста (формат mantissa).
    // Эмиссия WIN сверх купленного при каждом авто-claim; в earned_win НЕ входит.
    string earned_discount_win = 10;
}

// Ответ после клейма бонуса.
message ClaimDividendPoolResponse {
    // Новый pending-бонус (если сервис Active и генерация прошла успешно).
    // Отсутствует если сервис Paused — бонус забран, но новый не создан.
    optional biconom.types.DividendPool.PendingBonus bonus = 1;

    // Сумма USDT зачисленная на spot-кошелёк (формат mantissa).
    // "0" при первой активации.
    string claimed_amount = 2;
}

// История всех выплат дивидендов.
message GetDividendPoolHistoryResponse {
    // Список записей о выплатах (хронологический порядок).
    repeated biconom.types.DividendPool.Record items = 1;
}

// Запрос на получение страницы истории матчинг-бонуса.
message GetMatchingBonusHistoryRequest {
    // Курсор для пагинации — record_id, после/до которого продолжаем выборку
    // (в зависимости от направления Sort).
    // null/0 — начать с начала.
    optional uint64 cursor = 1;

    // Параметры сортировки и лимита. По умолчанию — BACKWARD (от новых к старым).
    optional biconom.types.Sort sort = 2;
}

// Ответ с историей матчинг-бонуса.
message GetMatchingBonusHistoryResponse {
    // Список записей текущей страницы.
    repeated MatchingBonusHistoryItem items = 1;

    // Суммарно получено матчинг-бонусом за всё время (formatted USDT mantissa).
    string cumulative_received = 2;

    // Суммарно упущенная выгода за всё время — то, что прошло мимо вверх по цепочке
    // (formatted USDT mantissa).
    string cumulative_missed = 3;
}

// Одна запись истории матчинг-бонуса (выплата конкретному спонсору в рамках группы).
message MatchingBonusHistoryItem {
    // ID записи в `matching_bonus_record`.
    uint64 record_id = 1;

    // ID группы распределения в `matching_bonus_group`.
    uint64 group_id = 2;

    // Инициатор клейма, чьё действие вызвало распределение.
    uint32 initiator_distributor_id = 3;

    // Глубина от инициатора (1 = прямой реферер).
    uint32 depth = 4;

    // Снимок депозита спонсора (invested_usdt) на момент выплаты (formatted USDT mantissa).
    string sponsor_deposit_at_pay = 5;

    // Верхний предел доли спонсора `min((ДС × РБ) / ДИ, РБ)` (formatted USDT mantissa).
    string target_limit = 6;

    // Уже выплаченное на момент достижения этого спонсора (formatted USDT mantissa).
    string paid_to_pivot = 7;

    // Сумма, фактически зачисленная спонсору (formatted USDT mantissa).
    string payout = 8;

    // Сумма, ушедшая выше или в пул (упущенная выгода) (formatted USDT mantissa).
    string missed_amount = 9;

    // Был ли активен флаг `MATCHING_BONUS_FULL_INHERITANCE` у спонсора в момент выплаты.
    bool had_flag = 10;

    // Время создания записи (unix seconds).
    uint32 created_at = 11;
}

// Запрос на выбор авто-реинвеста.
message SetAutoReinvestRequest {
    // Число циклов клейма из конфигурации. Должно совпадать с одним
    // из тарифов; иначе ошибка DIVIDEND_POOL_AUTO_REINVEST_INVALID_CYCLES.
    uint32 cycles = 1;
}

// Ответ на выбор авто-реинвеста.
message SetAutoReinvestResponse {
    // Созданное/обновлённое состояние авто-реинвеста.
    biconom.types.DividendPool.AutoReinvestState state = 1;
}

// Ответ с полным состоянием авто-реинвеста.
message GetAutoReinvestResponse {
    // Текущее состояние (если авто-реинвест когда-либо выбирался).
    optional biconom.types.DividendPool.AutoReinvestState state = 1;

    // Доступные тарифы из конфигурации (отсортированы по возрастанию циклов).
    repeated biconom.types.DividendPool.AutoReinvestTier tiers = 2;
}
